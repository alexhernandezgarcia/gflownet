# @package _global_

defaults:
   - override /env: sequences/smiles
   - override /gflownet: trajectorybalance
   - override /loss: trajectorybalance
   - override /proxy: seh_proxy
   - override /logger: wandb

# Environment
env:
  min_length: 1
  max_length: 30
  pad_token: "<unk>"
proxy:
  reward_function: exponential
  # Parameters of the reward function
  reward_function_kwargs:
    beta: 20
    alpha: 0.01
# Buffer
buffer:
  replay_capacity: 500
  check_diversity: True
  test:
    path : ${user.data.root}/test_sequence_smiles_seh_scores.pkl
    type : "pkl"
  train:
    path : ${user.data.root}/train_sequence_smiles_seh_scores.pkl
    type : "pkl"

# GFlowNet hyperparameters
gflownet:
  random_action_prob: 0.2
  optimizer:
    batch_size:
      forward: 100
      backward_replay: 50
      backward_dataset: 50
    lr: 0.0001
    z_dim: 16
    lr_z_mult: 100
    n_train_steps: 10000
  replay_sampling: weighted
  train_sampling: permutation

# Policy
policy:
  forward:
    type: mlp
    n_hid: 128
    n_layers: 3
  backward:
    shared_weights: True

# WandB
logger:
  do:
    online: False
  lightweight: True
  project_name: "smiles"
  run_name: "Smiles seh exponential"
  tags: 
    - gflownet
    - smiles
    - seh
    - exponential
    - beta=20
    - alpha=0.01
    - lr=0.0001
    - train_buffer
    - test_buffer
    - replay_sampling=weighted
    - train_sampling=permutation
    - n_layers=3

# Evaluator
evaluator:
  first_it: True
  period: 1000
  n: 1000
  checkpoints_period: 500


# Hydra
hydra:
  run:
    dir: ${user.logdir.root}/sequence/smiles/seh/${now:%Y-%m-%d_%H-%M-%S_%f}
